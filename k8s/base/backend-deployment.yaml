apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectpulse-api
  namespace: projectpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projectpulse-api
  template:
    metadata:
      labels:
        app: projectpulse-api
    spec:
      containers:
        - name: api
          image: projectpulse-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef:
                name: projectpulse-config
            - secretRef:
                name: projectpulse-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
