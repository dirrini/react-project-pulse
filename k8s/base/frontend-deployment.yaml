apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectpulse-web
  namespace: projectpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projectpulse-web
  template:
    metadata:
      labels:
        app: projectpulse-web
    spec:
      containers:
        - name: web
          image: projectpulse-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
