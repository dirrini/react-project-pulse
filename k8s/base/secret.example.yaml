apiVersion: v1
kind: Secret
metadata:
  name: projectpulse-secrets
  namespace: projectpulse
type: Opaque
stringData:
  DATABASE_URL: postgresql://USER:PASSWORD@HOST:5432/projectpulse
  AUTH_SECRET: replace-with-a-long-random-secret
  SEED_INTEGRATION_CLIENT_ID: sap-purchase-orders
  SEED_INTEGRATION_CLIENT_SECRET: replace-with-a-client-secret
  SEED_INTEGRATION_NAME: SAP Purchase Orders
  SEED_INTEGRATION_SCOPES: products:write
  SEED_INTEGRATION_PROJECT_EXTERNAL_CODE: SAP-PROJ-001
