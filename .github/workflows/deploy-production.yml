name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  API_HOST: ${{ vars.API_HOST }}
  APP_HOST: ${{ vars.APP_HOST }}
  ACM_CERTIFICATE_ID: ${{ vars.ACM_CERTIFICATE_ID }}
  ALB_SUBNET_1: ${{ vars.ALB_SUBNET_1 }}
  ALB_SUBNET_2: ${{ vars.ALB_SUBNET_2 }}
  ALB_SUBNET_3: ${{ vars.ALB_SUBNET_3 }}
  ALB_SUBNET_4: ${{ vars.ALB_SUBNET_4 }}
  ALB_SUBNET_5: ${{ vars.ALB_SUBNET_5 }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/projectpulse-api:${{ env.IMAGE_TAG }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=https://${{ vars.API_HOST }}/graphql
          tags: ${{ env.ECR_REGISTRY }}/projectpulse-web:${{ env.IMAGE_TAG }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER_NAME }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Apply production secrets
        run: |
          kubectl create namespace projectpulse --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic projectpulse-secrets \
            -n projectpulse \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=AUTH_SECRET="${{ secrets.AUTH_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render Kubernetes manifests
        run: |
          mkdir -p rendered
          kubectl kustomize k8s/aws \
            | python3 -c 'import os, sys; print(os.path.expandvars(sys.stdin.read()))' \
            > rendered/projectpulse.yaml
          if grep -n '\${' rendered/projectpulse.yaml; then
            echo "Unresolved placeholders found in rendered manifest."
            exit 1
          fi

      - name: Delete previous migration job
        run: kubectl delete job projectpulse-migrate -n projectpulse --ignore-not-found

      - name: Apply Kubernetes manifests
        run: kubectl apply -f rendered/projectpulse.yaml

      - name: Run database migrations
        run: |
          kubectl wait --for=create job/projectpulse-migrate -n projectpulse --timeout=60s

          if ! kubectl wait --for=condition=complete job/projectpulse-migrate -n projectpulse --timeout=420s; then
            echo "Migration job did not complete. Showing diagnostics."
            kubectl get job projectpulse-migrate -n projectpulse -o wide
            kubectl get pods -n projectpulse -l job-name=projectpulse-migrate -o wide
            kubectl describe job projectpulse-migrate -n projectpulse
            kubectl describe pods -n projectpulse -l job-name=projectpulse-migrate
            kubectl logs job/projectpulse-migrate -n projectpulse --all-containers=true --tail=200 || true
            kubectl get events -n projectpulse --sort-by=.lastTimestamp | tail -50
            exit 1
          fi

          kubectl logs job/projectpulse-migrate -n projectpulse --all-containers=true

      - name: Check rollouts
        run: |
          kubectl rollout status deployment/projectpulse-api -n projectpulse --timeout=180s
          kubectl rollout status deployment/projectpulse-web -n projectpulse --timeout=180s

      - name: Show ingress
        run: kubectl get ingress projectpulse -n projectpulse
